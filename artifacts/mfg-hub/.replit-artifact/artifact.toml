kind = "web"
previewPath = "/"
title = "MFG Bot Hub"
version = "1.0.0"
id = "artifacts/mfg-hub"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23605

[services.development]
run = "pnpm --filter @workspace/mfg-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mfg-hub", "run", "build" ]
serve = "static"
publicDir = "artifacts/mfg-hub/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23605"
BASE_PATH = "/"
